name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Mail2SNMP.sln

      - name: Build
        run: dotnet build Mail2SNMP.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test Mail2SNMP.sln --no-build --configuration Release --verbosity normal --filter "Category!=Docker"

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: windows-latest
    # Gating the job on the "production" GitHub environment causes the
    # OIDC token issued by GitHub to carry the subject claim
    #   repo:IT-Consulting-Kinner/Mail2SNMP_Server:environment:production
    # which the Azure App Registration has a matching Federated Credential
    # for. This is the canonical workaround for Azure FIC not supporting
    # wildcards on refs/tags/v* — one credential covers every future release
    # tag without having to add a new FIC per version.
    environment: production
    permissions:
      contents: write
      # Azure Trusted Signing uses workload-identity federation; the action
      # exchanges this token for an Azure AD access token. Without id-token:write
      # the federated credential cannot be issued and signing fails.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          # Ensure 4-part version for WiX (e.g. 1.2.3 -> 1.2.3.0)
          IFS='.' read -ra PARTS <<< "$TAG"
          while [ ${#PARTS[@]} -lt 4 ]; do PARTS+=("0"); done
          FOUR="${PARTS[0]}.${PARTS[1]}.${PARTS[2]}.${PARTS[3]}"
          echo "version_four=${FOUR}" >> "$GITHUB_OUTPUT"

      - name: Publish Worker
        run: >
          dotnet publish src/Mail2SNMP.Worker/Mail2SNMP.Worker.csproj
          --configuration Release
          --runtime win-x64
          --self-contained false
          --output ./publish/worker
          -p:DebugType=none
          -p:DebugSymbols=false
          -p:Version=${{ steps.version.outputs.version }}
          -p:AssemblyVersion=${{ steps.version.outputs.version_four }}
          -p:FileVersion=${{ steps.version.outputs.version_four }}
          -p:InformationalVersion=${{ steps.version.outputs.version }}

      - name: Install WiX Toolset
        run: dotnet tool install --global wix

      - name: Update installer version
        shell: pwsh
        run: |
          $file = "installer/Mail2SNMP.Installer/Package.wxs"
          $content = Get-Content $file -Raw
          $content = $content -replace 'Version="1\.0\.0\.0"', "Version=`"${{ steps.version.outputs.version_four }}`""
          Set-Content $file $content

      # ── Azure Trusted Signing — binary pre-sign ────────────────────────────
      # Sign every first-party EXE and DLL in the publish output BEFORE the MSI
      # is built. Without this the MSI is a signed wrapper around unsigned
      # binaries, and Defender/SmartScreen rejects the extracted Worker service
      # on first start even though the MSI itself is trusted. The same Azure
      # Trusted Signing identity + certificate profile is used for the binaries
      # and the MSI, so there is only one signer in the final Authenticode
      # chain.
      - name: Azure login (OIDC) — for binary signing
        uses: azure/login@v2
        with:
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          allow-no-subscriptions: true

      - name: Sign Worker binaries with Azure Trusted Signing
        uses: azure/trusted-signing-action@v0.5.1
        with:
          endpoint: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_TRUSTED_SIGNING_PROFILE }}
          files-folder: ./publish/worker
          files-folder-filter: exe,dll
          files-folder-recurse: true
          # Exclude the hundreds of shared third-party DLLs we don't own. The
          # regex only matches files whose name starts with "Mail2SNMP." so
          # Microsoft.*, Serilog.*, MailKit.* etc. stay untouched (they're
          # already signed by their original publisher).
          files-folder-filter-regex: '^Mail2SNMP\.'
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Restore Installer dependencies
        run: dotnet restore installer/Mail2SNMP.Installer/Mail2SNMP.Installer.wixproj

      - name: Build MSI
        shell: pwsh
        run: |
          $publishDir = (Resolve-Path "./publish/worker").Path + "\"
          dotnet build installer/Mail2SNMP.Installer/Mail2SNMP.Installer.wixproj --no-restore --configuration Release -p:DefineConstants="PublishDir=$publishDir"

      - name: Find MSI artifact
        id: msi
        shell: bash
        run: |
          # azure/trusted-signing-action requires an ABSOLUTE path in `files:`
          # — relative paths raise "file path … is not rooted". We turn the
          # find result into a full Windows-style path via cygpath so the
          # .NET SignTool wrapper inside the action accepts it.
          MSI=$(find installer -name "*.msi" | head -1)
          MSI_ABS=$(cygpath -w "$(readlink -f "$MSI")")
          echo "path=${MSI_ABS}" >> "$GITHUB_OUTPUT"
          echo "name=Mail2SNMP-${{ steps.version.outputs.version }}.msi" >> "$GITHUB_OUTPUT"
          echo "Resolved MSI path: ${MSI_ABS}"

      # ── Azure Trusted Signing — MSI outer wrapper ─────────────────────────
      # Re-use the Azure login from the binary pre-sign step above; the access
      # token is still valid at this point so no second azure/login call is
      # needed. Sign the MSI as the outer Authenticode wrapper — Defender and
      # SmartScreen check both the MSI itself and the binaries it installs,
      # and Wave R/S hardened the binary signing so the whole chain is now
      # covered end-to-end.
      - name: Sign MSI with Azure Trusted Signing
        uses: azure/trusted-signing-action@v0.5.1
        with:
          endpoint: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_TRUSTED_SIGNING_PROFILE }}
          files: ${{ steps.msi.outputs.path }}
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify MSI signature
        shell: pwsh
        run: |
          $sig = Get-AuthenticodeSignature -FilePath "${{ steps.msi.outputs.path }}"
          Write-Host "Status:        $($sig.Status)"
          Write-Host "Signer:        $($sig.SignerCertificate.Subject)"
          Write-Host "Issuer:        $($sig.SignerCertificate.Issuer)"
          Write-Host "TimestamperBy: $($sig.TimeStamperCertificate.Subject)"
          if ($sig.Status -ne 'Valid') {
            Write-Error "MSI signature is not valid: $($sig.Status) — $($sig.StatusMessage)"
            exit 1
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.msi.outputs.path }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
